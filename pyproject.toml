[tool.ruff]
line-length = 88
target-version = "py38"

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
# extend-ignore = ["E203", "W503"]  # TODO: Map .flake8 rules to Ruff codes

[tool.ruff.lint.isort]
known-first-party = ["src"]

# Respect existing .flake8 exclusions
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*.py" = ["S101"]