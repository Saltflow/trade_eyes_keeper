announcements:
  days: 7
  dividend_days: 420
  enable: true
  include_in_email: true
  enable_content_fetching: true
  enable_llm_extraction: true
  max_llm_calls_per_run: 30
  max_pdf_size_mb: 10

financial_reports:
  enable: true
  auto_enable: true
  conditional_enable: true
  force_analyze: true        # 强制分析所有股票，忽略自动/条件触发
  max_stocks_per_run: 2      # 常规模式每轮最多分析股票数
  max_force_stocks: 2        # 强制模式最多分析的股票数（0或缺省则不限）
  max_llm_calls_per_run: 80  # 财报分析LLM调用上限，单独计入保护大模型额度
  reports_per_stock: 3
  conditional_days: 30
data_source:
  type: web_crawler
email:
  enable_ssl: true
  enable_tls: false
  smtp_port: 465
  smtp_server: smtp.yeah.net
llm:
  api_type: deepseek
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat

logging:
  file: ./logs/quant_system.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
scheduler:
  run_time: '16:00'
  cache_bypass_cutoff: '15:55'
  timezone: Asia/Shanghai
stocks:
- 601728
- 600938  # 中国海油
- 601985  # 中国核电
- 601919  # 中远海控
- 600795  # 国电电力
- 601398  # 工商银行
- 601088  # 中国神华
- 512810  # 华宝中证军工ETF
- 510880  # 华泰柏瑞红利ETF
- 601818  # 光大银行
- 601390  # 中国中铁
storage:
  cache_days: 7
  cache_dir: ./cache
  csv_format: true
  data_dir: ./data

health_server:
  enabled: true
  host: 0.0.0.0
  port: 1933
