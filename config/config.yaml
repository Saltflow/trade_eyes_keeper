announcements:
  days: 7
  dividend_days: 420
  enable: true
  include_in_email: true
  enable_content_fetching: true
  enable_llm_extraction: true
  max_llm_calls_per_run: 30
  max_pdf_size_mb: 10

financial_reports:
  enable: false
  auto_enable: true
  conditional_enable: true
  force_analyze: false        # 强制分析所有股票，忽略自动/条件触发
  max_stocks_per_run: 2      # 常规模式每轮最多分析股票数
  max_force_stocks: 2        # 强制模式最多分析的股票数（0或缺省则不限）
  max_llm_calls_per_run: 80  # 财报分析LLM调用上限，单独计入保护大模型额度
  reports_per_stock: 3
  conditional_days: 30

backtest:
  enable: true
  run_in_daily_task: true
  cache_days: 7

data_source:
  type: web_crawler           # 数据源类型：web_crawler（主数据源）
  primary: web_crawler        # 主数据源
  secondary: baostock         # 备用数据源
  etf_force_web_crawler: true  # ETF强制使用web_crawler（除权支持更好）
  fallback_to_web_crawler: true  # baostock失败时是否回退到web_crawler
email:
  enable_ssl: true
  enable_tls: false
  smtp_port: 465
  smtp_server: smtp.yeah.net
llm:
  api_type: deepseek
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  enable_fundamental_analysis: false

logging:
  file: ./logs/quant_system.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: DEBUG  # 临时调试配置，问题定位后恢复
scheduler:
  run_time: '16:00'
  cache_bypass_cutoff: '15:55'
  timezone: Asia/Shanghai
stocks:
- 601728
- 600938  # 中国海油
- 601985  # 中国核电
- 601919  # 中远海控
- 600795  # 国电电力
- 601398  # 工商银行
- 601088  # 中国神华
- 512810  # 华宝中证军工ETF
- 510880  # 华泰柏瑞红利ETF
- 601818  # 光大银行
- 601390  # 中国中铁
- 180603
- 508091
- 513910
- 588000
# 美股
- GOOG  # 谷歌
- VOO   # 标普500ETF
# 港股
- 00883  # 中国海洋石油
- 01816  # 中广核新能源
# 新加坡
- C38U.SI  # 凯德商用中国信托
- AJBU.SI  # 吉宝数据中心房地产投资信托
storage:
  cache_days: 7
  cache_dir: ./cache
  csv_format: true
  data_dir: ./data

# baostock数据源配置
baostock:
  adjustflag: "2"           # 复权类型：2=前复权，3=后复权
  login_retry_times: 3      # 登录重试次数
  timeout_seconds: 30       # 请求超时时间
  enable: true              # 是否启用baostock数据源

# 历史数据缓存配置
historical_cache:
  enable: true                     # 是否启用历史数据缓存
  historical_cache_days: 30        # 历史数据缓存保留天数
  force_update_interval_days: 30   # 强制全量更新间隔天数
  check_dividend_interval_days: 7  # 检查除权间隔天数
  historical_lookback_days: 730    # 默认回溯天数（2年）
  enable_historical_cache: true    # 是否启用历史缓存（总开关）

health_server:
  enabled: true
  host: 0.0.0.0
  port: 1933

# 多层警报系统配置
alerts:
  config_path: "./config/alerts.yaml"  # 警报规则配置文件路径
  enabled: true                         # 是否启用多层警报系统
