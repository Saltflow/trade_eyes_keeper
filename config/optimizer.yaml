# 策略搜索器配置文件
# 
# 使用条件构建器池 + 贝叶斯优化搜索最优策略：
#   每条买卖规则同时搜索"用哪个信号 + 阈值多高 + 仓位多大"
# 
# 构建器列表（买入可用）:
#   deviation_cross    MA60偏离穿越（跌破阈值开仓）
#   rsi_signal         RSI超卖反弹
#   bollinger_signal   布林带下轨反弹
#   volume_spike       放量异动
#   deviation_absolute MA60绝对偏离
#   trend_follow       趋势跟踪（ADX+MACD）
#   none               禁用该规则
# 
# 触发方式: python main.py --optimize [--iterations N] [--drawdown-limit -X]

# ── 策略规则模板 ──
strategy_template:
  rules:
    buy_1:
      type: buy
      priority: 1
      label: "买入规则1"
      builders:
        - deviation_cross
        - rsi_signal
        - bollinger_signal
        - volume_spike
        - deviation_absolute
        - trend_follow
        - none
      budget_pool: buy

    buy_2:
      type: buy
      priority: 2
      label: "买入规则2 (深跌)"
      builders:
        - deviation_cross
        - rsi_signal
        - bollinger_signal
        - volume_spike
        - deviation_absolute
        - trend_follow
        - none
      budget_pool: buy

    sell_1:
      type: sell
      priority: 3
      label: "卖出规则1"
      builders:
        - deviation_cross
        - rsi_signal
        - bollinger_signal
        - deviation_absolute
        - trend_follow
        - none
      budget_pool: sell

    sell_2:
      type: sell
      priority: 4
      label: "卖出规则2 (中涨)"
      builders:
        - deviation_cross
        - rsi_signal
        - bollinger_signal
        - deviation_absolute
        - trend_follow
        - none
      budget_pool: sell

    sell_3:
      type: sell
      priority: 5
      label: "卖出规则3 (急涨)"
      builders:
        - deviation_cross
        - rsi_signal
        - bollinger_signal
        - deviation_absolute
        - trend_follow
        - none
      budget_pool: sell

# ── 搜索参数范围 ──
search_params:
  threshold_range: [0.0, 1.0]       # 归一化阈值，构建器内部映射
  buy_frac_range: [0.02, 0.30]      # 买入动用现金比例
  sell_frac_range: [0.10, 0.50]     # 卖出动用持仓比例

# ── 优化约束 ──
constraints:
  max_drawdown_pct: -25        # 最大允许回撤（训练期），超出则惩罚
  drawdown_penalty_weight: 2.0  # 回撤惩罚系数
  iterations: 150               # 贝叶斯优化迭代次数
  random_starts: 20             # 初始随机采样点数

# ── 输出 ──
output:
  top_n: 10
  save_dir: "data/optimizer/"
