<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8">
<style>
  @page {{ size: A4; margin: 0.6cm; }}
  body {{ font-family: -apple-system,'Microsoft YaHei','PingFang SC',sans-serif; font-size: 10px; color: #1a2a3a; margin: 0; }}
  .header {{ background: #1a2a3a; color: #fff; padding: 14px 16px; text-align: center; }}
  .header .title {{ font-size: 18px; font-weight: 700; letter-spacing: 2px; }}
  .header .sub {{ font-size: 9px; color: #8899aa; margin-top: 3px; }}
  .kpi-row {{ display: flex; gap: 10px; margin: 10px 16px 6px; }}
  .kpi {{ flex:1; text-align:center; padding:8px; border:1px solid #e0e0e0; }}
  .kpi .num {{ font-size: 16px; font-weight: 700; color: #c9a84c; }}
  .kpi .label {{ font-size: 8px; color: #666; }}
  .kpi .num.green {{ color: #2d8a56; }}
  .kpi .num.red {{ color: #b85450; }}
  .section-bar {{ background: #1a2a3a; color: #c9a84c; padding: 5px 16px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }}
  .chart {{ padding: 6px 12px; }}
  .chart img {{ max-width: 100%; height: auto; }}
  .trigger {{ padding: 4px 16px; }}
  .trigger .row {{ padding: 4px 8px; margin: 2px 0; border-radius: 3px; font-size: 9.5px; }}
  .trigger .buy {{ background: #e8f5e9; }}
  .trigger .sell {{ background: #fdecea; }}
  .trigger .code {{ font-weight: 700; padding:0 6px; }}
  table {{ width: 100%; border-collapse: collapse; font-size: 9px; margin: 0 16px; }}
  th {{ background: #1a2a3a; color: #c9a84c; padding: 6px 4px; text-align: left; font-weight: 600; }}
  th.num {{ text-align: right; }}
  td {{ padding: 4px; border-bottom: 1px solid #eee; }}
  td.num {{ text-align: right; }}
  tr:nth-child(even) td {{ background: #f8f9fa; }}
  tr.signal-buy td {{ background: #e8f5e9; }}
  tr.signal-sell td {{ background: #fdecea; }}
  .group-divider td {{ background: #1a2a3a !important; color: #c9a84c; font-size: 8px; padding: 3px 4px; font-weight: 700; }}
  .green {{ color: #2d8a56; }}
  .red {{ color: #b85450; }}
  .footnote {{ padding: 6px 16px; font-size: 8px; color: #8899aa; line-height: 1.4; }}
  .footer {{ padding: 6px 16px; font-size: 7px; color: #bbb; text-align: center; border-top: 1px solid #eee; }}
</style></head><body>
<div class="header">
  <div class="title">STOCK QUANT REPORT</div>
  <div class="sub">{report_date} · {server_hostname}</div>
</div>

<div class="kpi-row" style="margin-top:8px">
  <div class="kpi"><div class="kpi__KPI0_COLOR__">__KPI0__</div><div class="label">__KPI0_LABEL__</div></div>
  <div class="kpi"><div class="kpi__KPI1_COLOR__">__KPI1__</div><div class="label">__KPI1_LABEL__</div></div>
  <div class="kpi"><div class="kpi__KPI2_COLOR__">__KPI2__</div><div class="label">__KPI2_LABEL__</div></div>
  <div class="kpi"><div class="kpi__KPI3_COLOR__">__KPI3__</div><div class="label">__KPI3_LABEL__</div></div>
</div>

<div class="section-bar">偏离度 30 日走势</div>
<div class="chart">{chart_img}</div>

<div class="section-bar">触发信号</div>
<div class="trigger">{trigger_rows}</div>

<div class="section-bar">完整监控</div>
<div style="padding:0 16px;overflow-x:auto">
<table>{table_rows}</table>
</div>

<div class="footnote">{strategy_footnote}<br>{backtest_footnote}</div>

<div class="footer">Stock Quant · Auto Generated</div>
</body></html>
