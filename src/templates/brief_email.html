<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{label}</title>
    <style>
        table {{
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
        }}
        th, td {{
            border: 1px solid #ddd;
            padding: 6px 10px;
            text-align: left;
            font-size: 13px;
        }}
        th {{
            background-color: #f2f2f2;
            font-weight: bold;
        }}
        .positive {{
            color: #4caf50;
        }}
        .negative {{
            color: #f44336;
        }}
        .closed {{
            color: #999;
            font-style: italic;
        }}
    </style>
</head>
<body>
    <h2>{label} - {report_date}</h2>
    <p>
        检测时间：{current_time}&nbsp;&nbsp;|&nbsp;&nbsp;
        活跃标的：{active_count}/{total_count}
    </p>

    <table>
        <tr>
            <th>代码</th><th>名称</th><th>开盘</th><th>现价</th>
            <th>锚点</th><th>锚值</th><th>偏离率</th>
        </tr>
        {brief_rows}
    </table>

    <p style="color:#888;font-size:12px;">
        偏离率 = (现价 - 锚点值) / 锚点值 × 100% |
        每只标的标注 <b>实际回溯交易日最短</b> 且 <b>落入警报阈值区间</b> 的锚点
        (ma60=60天 < wma20≈100天 < wma30≈150天 < wma50≈250天)
    </p>
</body>
</html>
