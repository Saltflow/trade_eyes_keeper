<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{title}</title>
    <style>
        body {{ font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }}
        .error {{ background-color: #ffebee; border-left: 4px solid #f44336; padding: 20px; margin: 20px 0; }}
        .back-link {{ display: inline-block; margin-top: 20px; color: #2196F3; }}
    </style>
</head>
<body>
    <h1>❌ {title}</h1>
    <div class="error">
        {message}
    </div>
    <a href="{back_url}" class="back-link">← 返回</a>
</body>
</html>
